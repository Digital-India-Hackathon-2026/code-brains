# Server Port Configuration
# Changed from 8081 -> 8080 to match the frontend's default backend URL
# (muletrace-ai reads "muletrace-spring-url" from localStorage, defaulting
# to http://localhost:8080)
server.port=8081

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5433/muleguard_db
spring.datasource.username=postgres
spring.datasource.password=root

# Hibernate / JPA Settings
# 'update' automatically creates your SQL tables for you!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Downstream services this backend proxies to
muleguard.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}
muleguard.ai-engine.url=${AI_ENGINE_URL:http://localhost:8001}

# CORS: allow the Vite dev server
muleguard.cors.allowed-origin=${FRONTEND_ORIGIN:http://localhost:3000}

